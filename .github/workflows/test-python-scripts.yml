name: Check parking prediction calculations

on: 
  pull_request:
    branches:
      - main
  push:
    branches: 
      - main
jobs:
  engine-test:
    runs-on: ubuntu-latest
    defaults:
        run:
          shell: bash -el {0} # conda requires bash to function
    steps:
      - uses: actions/checkout@v6
        with: 
          fetch-depth: 0
      - name: Cache conda environment
        id: cache-env
        uses: actions/cache@v5
        env:
          CACHE_NUMBER: 0
        with:
          path: ~/conda_pkgs_dir
          key:
            ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-${{
            hashFiles('serveur_calcul_python/environment.yml') }}
      - name: Setup conda environment
        uses: conda-incubator/setup-miniconda@v4
        with:
          activate-environment: serveur_calcul_python
          environment-file: serveur_calcul_python/environment.yml
          auto-activate: true
          use-only-tar-bz2: true
      - name: Test conda installation
        run: conda info
      - name: Run tests
        run: | 
          pytest serveur_calcul_python